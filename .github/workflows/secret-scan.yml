name: Secret scan

# Garde-fou de sécurité : empêche qu'une clé/secret soit commise dans ce dépôt PUBLIC.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Scan anti-secret (clés, tokens, fichiers .env/.pem/.key)
        run: python3 scripts/check_secrets.py
