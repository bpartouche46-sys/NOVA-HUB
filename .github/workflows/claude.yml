name: Claude

# Permet de mentionner @claude dans une issue ou une PR pour déclencher Claude Code.
# Pré-requis (à faire UNE fois, côté GitHub) :
#   1. Installer l'app : https://github.com/apps/claude  (admin du dépôt requis)
#   2. Générer un jeton d'abonnement en local :  claude setup-token
#   3. Ajouter le secret de dépôt  CLAUDE_CODE_OAUTH_TOKEN  (= le jeton généré)
#      → Settings ▸ Secrets and variables ▸ Actions ▸ Repository secrets
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
